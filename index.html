<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La 10 Burger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root{
    --bg:#0B0B0D;
    --panel:#15151A;
    --cream:#F5F1E6;
    --sky:#6CACE4;
    --flame:#E8590C;
    --line:#2A2A30;
    --muted:#8A8A92;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--cream);
    font-family:'DM Sans', sans-serif;
  }
  header{
    padding:48px 24px 32px; text-align:center; position:relative;
    border-bottom:1px solid var(--line);
  }
  .jersey-number{
    font-family:'Anton', sans-serif;
    font-size:clamp(64px, 18vw, 140px);
    line-height:0.8;
    color:var(--sky);
    -webkit-text-stroke: 2px var(--cream);
    margin:0;
  }
  header h1{
    font-family:'Anton', sans-serif;
    font-size:clamp(22px, 5vw, 34px);
    letter-spacing:2px;
    margin:8px 0 4px;
    text-transform:uppercase;
  }
  header p{ color:var(--muted); margin:0; font-style:italic; }

  .grid{
    max-width:1080px; margin:0 auto; padding:32px 20px 80px;
    display:grid; gap:18px;
    grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
  }
  .card{
    background:var(--panel); border:1px solid var(--line);
    border-radius:4px; padding:20px; position:relative;
    display:flex; flex-direction:column; gap:10px;
    transition:border-color .2s;
  }
  .card:hover{ border-color:var(--sky); }
  .card.agotado{ opacity:0.4; }
  .card .num{
    position:absolute; top:14px; right:16px;
    font-family:'Anton', sans-serif; color:var(--line); font-size:28px;
  }
  .card h2{
    margin:0; font-size:19px; text-transform:uppercase;
    letter-spacing:0.5px; padding-right:40px;
  }
  .card .desc{ color:var(--muted); font-size:14px; line-height:1.5; margin:0; flex:1; }
  .card select{
    background:var(--bg); color:var(--cream); border:1px solid var(--line);
    padding:8px; border-radius:3px; font-family:'DM Sans'; font-size:13px;
  }
  .card .footer{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:6px; padding-top:12px; border-top:1px dashed var(--line);
  }
  .price{ font-family:'Anton', sans-serif; color:var(--flame); font-size:20px; }
  button.comprar{
    background:var(--sky); color:#0B0B0D; border:none;
    font-family:'Anton', sans-serif; letter-spacing:1px;
    padding:10px 18px; border-radius:3px; cursor:pointer;
    text-transform:uppercase; font-size:13px;
  }
  button.comprar:disabled{ background:var(--line); color:var(--muted); cursor:not-allowed; }
  .badge-agotado{
    position:absolute; top:14px; left:16px;
    background:var(--flame); color:#fff; font-size:10px;
    padding:3px 8px; border-radius:2px; letter-spacing:1px;
    text-transform:uppercase; font-family:'Anton', sans-serif;
  }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--cream); color:#0B0B0D; padding:12px 22px;
    border-radius:4px; font-weight:700; opacity:0; transition:opacity .3s;
    pointer-events:none;
  }
  .toast.show{ opacity:1; }
  footer{ text-align:center; color:var(--muted); font-size:12px; padding:24px; }
</style>
</head>
<body>

<header>
  <p class="jersey-number">10</p>
  <h1>La 10 Burger</h1>
  <p>Hamburguesas que juegan de titular</p>
</header>

<div class="grid" id="grid">
  <p style="color:var(--muted); padding:20px;">Cargando menú...</p>
</div>

<div class="toast" id="toast"></div>

<footer>La 10 Burger — Panel de administración: <a href="admin.html" style="color:var(--sky);">acceso staff</a></footer>

<script>
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const grid = document.getElementById('grid');
const toast = document.getElementById('toast');

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 2500);
}

async function cargarMenu(){
  const { data: productos, error: e1 } = await supabase.from('productos_variaciones').select('*').eq('activo', true).order('id_variacion');
  const { data: disponibilidad, error: e2 } = await supabase.rpc('disponibilidad_productos');
  const { data: modificadores, error: e3 } = await supabase.from('modificadores').select('*');

  if(e1 || e2){ grid.innerHTML = '<p style="color:var(--flame)">Error cargando el menú. Revisá config.js</p>'; return; }

  const dispoMap = {};
  (disponibilidad||[]).forEach(d => dispoMap[d.id_variacion] = d.unidades_disponibles);

  grid.innerHTML = '';
  productos.forEach((p, idx) => {
    const dispo = dispoMap[p.id_variacion] ?? 0;
    const agotado = dispo <= 0;
    const mods = (modificadores||[]).filter(m => m.id_variacion === p.id_variacion);

    const card = document.createElement('div');
    card.className = 'card' + (agotado ? ' agotado' : '');
    card.innerHTML = `
      <span class="num">${String(idx+1).padStart(2,'0')}</span>
      ${agotado ? '<span class="badge-agotado">Agotado</span>' : ''}
      <h2>${p.nombre_producto}</h2>
      ${mods.length ? `<select class="mod-select">${mods.map(m=>`<option value="${m.id_modificador}">${m.nombre}</option>`).join('')}</select>` : ''}
      <div class="footer">
        <span class="price">$${Number(p.precio).toLocaleString('es-AR')}</span>
        <button class="comprar" ${agotado?'disabled':''}>Comprar</button>
      </div>
    `;
    const btn = card.querySelector('.comprar');
    btn.addEventListener('click', () => comprar(p.id_variacion, card.querySelector('.mod-select')?.value, btn));
    grid.appendChild(card);
  });
}

async function comprar(id_variacion, id_modificador, btn){
  btn.disabled = true;
  btn.textContent = 'Confirmando...';
  const { data, error } = await supabase.rpc('descontar_stock', {
    p_id_variacion: id_variacion,
    p_id_modificador: id_modificador ? Number(id_modificador) : null
  });

  if(error){
    showToast('Sin stock suficiente para este pedido 😕');
    btn.disabled = false;
    btn.textContent = 'Comprar';
  } else {
    showToast('¡Pedido confirmado! 🎉');
    cargarMenu(); // refresca disponibilidad
  }
}

cargarMenu();
</script>
</body>
</html>
