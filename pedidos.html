<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos · La 10 Burger</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root{
    --bg:#0B0B0D; --panel:#15151A; --cream:#F5F1E6;
    --sky:#6CACE4; --flame:#E8590C; --line:#2A2A30; --muted:#8A8A92;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--cream); font-family:'DM Sans', sans-serif; }
  .wrap{ max-width:780px; margin:0 auto; padding:40px 20px; }
  h1{ font-family:'Anton', sans-serif; letter-spacing:1px; text-transform:uppercase; font-size:26px; margin-bottom:4px; }
  .sub{ color:var(--muted); margin-bottom:10px; }
  .total{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:16px 20px; margin-bottom:24px; display:flex; justify-content:space-between; align-items:center;
  }
  .total .label{ color:var(--muted); font-size:13px; text-transform:uppercase; letter-spacing:1px; }
  .total .num{ font-family:'Anton', sans-serif; color:var(--flame); font-size:24px; }
  table{ width:100%; border-collapse:collapse; }
  th, td{ text-align:left; padding:12px 8px; border-bottom:1px solid var(--line); font-size:14px; }
  th{ color:var(--muted); text-transform:uppercase; font-size:11px; letter-spacing:1px; }
  .precio{ color:var(--flame); font-weight:700; }
  select, input{
    background:var(--panel); color:var(--cream); border:1px solid var(--line);
    padding:8px; border-radius:4px; font-family:'DM Sans'; font-size:13px; margin-bottom:16px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Pedidos</h1>
  <p class="sub">La 10 Burger — historial de ventas</p>

  <select id="filtroFecha">
    <option value="hoy">Hoy</option>
    <option value="7dias">Últimos 7 días</option>
    <option value="todos">Todos</option>
  </select>

  <div class="total">
    <span class="label">Total vendido</span>
    <span class="num" id="totalVendido">$0</span>
  </div>

  <table>
    <thead>
      <tr><th>Fecha y hora</th><th>Producto</th><th>Precio</th></tr>
    </thead>
    <tbody id="tablaBody">
      <tr><td colspan="3">Cargando...</td></tr>
    </tbody>
  </table>
</div>

<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function cargarPedidos(){
  const filtro = document.getElementById('filtroFecha').value;
  let query = sb.from('pedidos').select('*').order('fecha', { ascending: false });

  if(filtro === 'hoy'){
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    query = query.gte('fecha', hoy.toISOString());
  } else if(filtro === '7dias'){
    const hace7 = new Date(); hace7.setDate(hace7.getDate()-7);
    query = query.gte('fecha', hace7.toISOString());
  }

  const { data, error } = await query;
  const tbody = document.getElementById('tablaBody');

  if(error || !data){
    tbody.innerHTML = '<tr><td colspan="3">Error al cargar pedidos</td></tr>';
    return;
  }

  if(data.length === 0){
    tbody.innerHTML = '<tr><td colspan="3">No hay pedidos en este período</td></tr>';
    document.getElementById('totalVendido').textContent = '$0';
    return;
  }

  let total = 0;
  tbody.innerHTML = data.map(p => {
    total += Number(p.precio);
    const fecha = new Date(p.fecha).toLocaleString('es-AR');
    return `<tr><td>${fecha}</td><td>${p.nombre_producto}</td><td class="precio">$${Number(p.precio).toLocaleString('es-AR')}</td></tr>`;
  }).join('');

  document.getElementById('totalVendido').textContent = '$' + total.toLocaleString('es-AR');
}

document.getElementById('filtroFecha').addEventListener('change', cargarPedidos);
cargarPedidos();
</script>
</body>
</html>
