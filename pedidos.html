<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos · La 10 Burger</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root{
    --bg:#0B0B0D; --panel:#15151A; --cream:#F5F1E6;
    --sky:#6CACE4; --flame:#E8590C; --line:#2A2A30; --muted:#8A8A92;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--cream); font-family:'DM Sans', sans-serif; }

  /* ── LOGIN ── */
  #loginScreen{
    display:flex; align-items:center; justify-content:center; min-height:100vh;
  }
  .login-box{
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    padding:40px 32px; width:min(340px,90vw); text-align:center;
  }
  .login-box h2{ font-family:'Anton', sans-serif; letter-spacing:1px; text-transform:uppercase; margin:0 0 6px; font-size:22px; }
  .login-box p{ color:var(--muted); font-size:13px; margin:0 0 24px; }
  .login-box input{
    width:100%; padding:11px 14px; background:var(--bg); border:1px solid var(--line);
    color:var(--cream); border-radius:4px; font-family:'DM Sans'; font-size:14px; margin-bottom:12px;
  }
  .login-box input:focus{ outline:none; border-color:var(--sky); }
  .login-box button{
    width:100%; padding:12px; background:var(--sky); color:#0B0B0D; border:none;
    border-radius:4px; font-family:'Anton', sans-serif; letter-spacing:1px; text-transform:uppercase;
    font-size:14px; cursor:pointer;
  }
  .login-box button:hover{ opacity:0.9; }
  .login-error{ color:var(--flame); font-size:13px; margin-top:10px; display:none; }

  /* ── PEDIDOS ── */
  #appScreen{ display:none; }
  .wrap{ max-width:780px; margin:0 auto; padding:40px 20px; }
  .top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  h1{ font-family:'Anton', sans-serif; letter-spacing:1px; text-transform:uppercase; font-size:26px; margin:0; }
  .btn-salir{
    background:none; border:1px solid var(--line); color:var(--muted); padding:6px 14px;
    border-radius:4px; font-family:'DM Sans'; font-size:13px; cursor:pointer;
  }
  .btn-salir:hover{ border-color:var(--flame); color:var(--flame); }
  .sub{ color:var(--muted); margin:4px 0 20px; }
  .total{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:16px 20px; margin-bottom:24px; display:flex; justify-content:space-between; align-items:center;
  }
  .total .label{ color:var(--muted); font-size:13px; text-transform:uppercase; letter-spacing:1px; }
  .total .num{ font-family:'Anton', sans-serif; color:var(--flame); font-size:24px; }
  select{
    background:var(--panel); color:var(--cream); border:1px solid var(--line);
    padding:8px; border-radius:4px; font-family:'DM Sans'; font-size:13px; margin-bottom:16px;
  }
  .orden{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:18px 20px; margin-bottom:14px;
  }
  .orden-header{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
  .orden-header .cliente{ font-family:'Anton', sans-serif; text-transform:uppercase; letter-spacing:0.5px; font-size:16px; }
  .orden-header .fecha{ color:var(--muted); font-size:12px; }
  .orden-header .telefono{ color:var(--sky); font-size:12px; }
  .orden-items{ margin:0; padding:0; list-style:none; }
  .orden-items li{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line); font-size:14px; gap:8px; }
  .orden-items li:last-child{ border-bottom:none; }
  .orden-items .detalle{ color:var(--muted); font-size:12px; display:block; }
  .orden-total{ display:flex; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); font-weight:700; }
  .orden-total span:last-child{ color:var(--flame); }
  .vacio{ color:var(--muted); text-align:center; padding:40px 0; }
</style>
</head>
<body>

<!-- Pantalla de login -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Pedidos</h2>
    <p>La 10 Burger — acceso restringido</p>
    <input type="password" id="passInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter') intentarLogin()">
    <button onclick="intentarLogin()">Ingresar</button>
    <p class="login-error" id="loginError">Contraseña incorrecta</p>
  </div>
</div>

<!-- Pantalla de pedidos (oculta hasta login) -->
<div id="appScreen">
  <div class="wrap">
    <div class="top-bar">
      <h1>Pedidos</h1>
      <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
    </div>
    <p class="sub">La 10 Burger — historial de ventas</p>

    <select id="filtroFecha">
      <option value="hoy">Hoy</option>
      <option value="7dias">Últimos 7 días</option>
      <option value="todos">Todos</option>
    </select>

    <div class="total">
      <span class="label">Total vendido</span>
      <span class="num" id="totalVendido">$0</span>
    </div>

    <div id="listaOrdenes"><p class="vacio">Cargando...</p></div>
  </div>
</div>

<script>
// ── CONTRASEÑA ──────────────────────────────────────────────
// Cambiá este valor por la contraseña que quieras usar
const PASSWORD_PEDIDOS = 'la10burger2024';
const SESSION_KEY = 'la10_pedidos_auth';

function intentarLogin(){
  const pass = document.getElementById('passInput').value;
  if(pass === PASSWORD_PEDIDOS){
    sessionStorage.setItem(SESSION_KEY, '1');
    mostrarApp();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
  }
}

function cerrarSesion(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passInput').value = '';
}

function mostrarApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  cargarPedidos();
}

// Al cargar la página, verificar si ya hay sesión
if(sessionStorage.getItem(SESSION_KEY) === '1'){
  mostrarApp();
}

// ── PEDIDOS ──────────────────────────────────────────────────
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function cargarPedidos(){
  const filtro = document.getElementById('filtroFecha').value;

  // Usamos 'creado_en' (nombre real de la columna en la tabla)
  let query = sb.from('pedidos')
    .select(`
      *,
      productos_variaciones (nombre_producto)
    `)
    .order('creado_en', { ascending: false });

  if(filtro === 'hoy'){
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    query = query.gte('creado_en', hoy.toISOString());
  } else if(filtro === '7dias'){
    const hace7 = new Date(); hace7.setDate(hace7.getDate()-7);
    query = query.gte('creado_en', hace7.toISOString());
  }

  const { data, error } = await query;
  const cont = document.getElementById('listaOrdenes');

  if(error || !data){
    cont.innerHTML = '<p class="vacio">Error al cargar pedidos: ' + (error?.message || 'desconocido') + '</p>';
    return;
  }

  if(data.length === 0){
    cont.innerHTML = '<p class="vacio">No hay pedidos en este período</p>';
    document.getElementById('totalVendido').textContent = '$0';
    return;
  }

  // Agrupar por id_orden
  const grupos = {};
  let totalGeneral = 0;

  data.forEach(p => {
    const clave = p.id_orden || ('pedido-' + p.id_pedido);
    if(!grupos[clave]){
      grupos[clave] = {
        cliente: p.nombre_cliente || '(sin nombre)',
        telefono: p.telefono || '',
        fecha: p.creado_en,
        items: [],
        total: 0
      };
    }
    grupos[clave].items.push(p);
    grupos[clave].total += Number(p.precio || 0);
    totalGeneral += Number(p.precio || 0);
  });

  document.getElementById('totalVendido').textContent = '$' + totalGeneral.toLocaleString('es-AR');

  cont.innerHTML = Object.values(grupos).map(g => {
    const fecha = new Date(g.fecha).toLocaleString('es-AR', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
    return `
      <div class="orden">
        <div class="orden-header">
          <span class="cliente">${g.cliente}</span>
          <div style="display:flex; gap:12px; align-items:center;">
            ${g.telefono ? `<span class="telefono">📱 ${g.telefono}</span>` : ''}
            <span class="fecha">${fecha}</span>
          </div>
        </div>
        <ul class="orden-items">
          ${g.items.map(it => {
            const nombre = it.productos_variaciones?.nombre_producto || '(producto)';
            const extras = [];
            if(it.sin_papas) extras.push('Reemplazar papas por aros');
            return `<li>
              <span>
                ${nombre}
                ${extras.length ? `<span class="detalle">${extras.join(' · ')}</span>` : ''}
              </span>
              <span>$${Number(it.precio||0).toLocaleString('es-AR')}</span>
            </li>`;
          }).join('')}
        </ul>
        <div class="orden-total"><span>Total orden</span><span>$${g.total.toLocaleString('es-AR')}</span></div>
      </div>
    `;
  }).join('');
}

document.getElementById('filtroFecha').addEventListener('change', cargarPedidos);
</script>
</body>
</html>
